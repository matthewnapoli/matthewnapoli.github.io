<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options/Greeks Visualizer</title>
    <style type="text/css">
        canvas {
            border: 0;
            background: #030303;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        html, body {
            margin: 0;
            padding: 0;
            font-family: 'Source Code Pro', monospace;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            color: #ffffff;
        }

        main {
            position: relative;
            z-index: 1;
            width: min(1180px, 92vw);
            margin: 7vh auto 8vh;
        }

        mark {
            background: #000000;
            color: #ffffff;
        }

        h1 {
            font-size: 1.45rem;
            font-weight: 400;
            margin: 0 0 1rem;
        }

        .clickable-underline {
            color: white;
            text-decoration: underline;
        }

        .toolbar, .greeks-panel, .legs, .plot-wrap {
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 1rem;
        }

        .section-block {
            margin-top: 1rem;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(4, minmax(120px, 1fr));
            gap: 0.75rem;
            align-items: end;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 400;
            margin: 0 0 0.45rem;
        }

        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.45rem;
        }

        .section-heading .section-title {
            margin: 0;
        }

        label {
            display: grid;
            gap: 0.3rem;
            font-size: 0.82rem;
        }

        input, select, button {
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #ffffff;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.9rem;
            min-height: 2.1rem;
            min-width: 0;
            padding: 0.25rem 0.45rem;
        }

        button {
            cursor: pointer;
        }

        button:hover {
            border-color: #ffffff;
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            column-gap: 0.9rem;
            row-gap: 0.55rem;
        }

        .metric {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 0.6rem;
            align-items: center;
            min-height: 2.2rem;
        }

        .metric button {
            min-width: 4.3rem;
        }

        .metric-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .metric-formula {
            display: inline-grid;
            grid-template-rows: auto auto;
            line-height: 1;
            text-align: center;
        }

        .metric-formula span:first-child {
            border-bottom: 1px solid #ffffff;
            padding-bottom: 0.08rem;
        }

        .metric-formula span:last-child {
            padding-top: 0.08rem;
        }

        .legs-header, .leg {
            display: grid;
            grid-template-columns: minmax(82px, 0.75fr) minmax(82px, 0.75fr) minmax(72px, 0.6fr) repeat(3, minmax(86px, 1fr)) 2.4rem;
            gap: 0.45rem;
            align-items: center;
        }

        .legs-header {
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            opacity: 0.75;
        }

        .leg {
            margin-top: 0.45rem;
        }

        .leg button {
            min-width: 2.2rem;
            padding-left: 0;
            padding-right: 0;
        }

        .plot-wrap {
            min-height: 420px;
        }

        .plot-wrap button {
            min-width: 8rem;
        }

        #add-leg {
            min-height: 1.75rem;
            min-width: 5.5rem;
            padding: 0.15rem 0.45rem;
        }

        #plot {
            width: 100%;
            height: 420px;
        }

        .page-actions {
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: flex-start;
            margin: 1rem 0 8vh 0;
        }

        .page-actions button {
            background: #050505;
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #ffffff;
            cursor: pointer;
            font-family: 'Source Code Pro', monospace;
            font-size: 0.78rem;
            min-height: 1.75rem;
            min-width: auto;
            padding: 0.15rem 0.45rem;
        }

        .page-actions button:hover {
            border-color: #ffffff;
        }

        .invalid {
            color: #ff7777;
            margin-top: 0.35rem;
        }

        .invalid:empty {
            display: none;
        }

        @media (max-width: 900px) {
            .toolbar, .summary {
                grid-template-columns: 1fr 1fr;
            }

            .section-heading {
                align-items: stretch;
                flex-direction: column;
            }

            .legs-header {
                display: none;
            }

            .leg {
                grid-template-columns: 1fr 1fr;
                border-top: 1px solid rgba(255, 255, 255, 0.2);
                padding-top: 0.75rem;
            }
        }

        @media (max-width: 600px) {
            main {
                width: 92vw;
                margin-top: 5vh;
            }

            .toolbar, .summary, .leg {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200;0,400;1,300&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>

<body>
    <canvas></canvas>
    <main>
        <mark>
            <h1>Options/Greeks Visualizer</h1>
            <a href="projects.html" class="clickable-underline">- Back to projects</a>
        </mark>

        <div class="section-block">
            <h2 class="section-title">Spot Parameters:</h2>
            <section class="toolbar">
                <label>Spot
                    <input id="spot" type="number" value="100" min="0.01" step="0.01">
                </label>
                <label>Rate %
                    <input id="rate" type="number" value="4.5" step="0.01">
                </label>
                <label>Imp Vol %
                    <input id="volatility" type="number" value="25" min="0.01" step="0.01">
                </label>
                <label>Contract multiplier
                    <input id="multiplier" type="number" value="100" min="1" step="1">
                </label>
            </section>
        </div>
        <div class="invalid" id="invalid"></div>

        <div class="section-block">
            <div class="section-heading">
                <h2 class="section-title">Option Leg Parameters:</h2>
                <button id="add-leg" type="button">+ leg</button>
            </div>
            <section class="legs">
                <div class="legs-header">
                    <span>side</span>
                    <span>type</span>
                    <span>qty</span>
                    <span>strike</span>
                    <span>time (years)</span>
                    <span>div %</span>
                    <span></span>
                </div>
                <div id="legs"></div>
            </section>
        </div>

        <div class="section-block">
            <h2 class="section-title">Greeks:</h2>
            <section class="greeks-panel">
                <div class="summary" id="summary"></div>
            </section>
        </div>

        <div class="section-block">
            <div class="section-heading">
                <h2 class="section-title">Visualization:</h2>
                <button id="plot-payoff" type="button">plot payoff</button>
            </div>
            <section class="plot-wrap">
                <div id="plot"></div>
            </section>
        </div>

        <div class="page-actions">
            <button id="disable-brownian" type="button">disable brownian motion animation</button>
        </div>
    </main>

    <script src="canvas.js"></script>
    <script src="options-greeks.js"></script>
</body>
</html>
