<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reinforcement Learning for Delta Hedging</title>
    <style type="text/css">
        canvas {
            border: 0;
            background: #030303;
            position: fixed;
            top: 0;

            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        html, body {
            margin: 0;

        }

            z-index: 1;
            display: flex;

        }

        .page-actions button {

            border: 1px solid rgba(255, 255, 255, 0.35);

            padding: 0.15rem 0.45rem;
        }

        .page-actions button:hover {

    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200;0,400;1,300&display=swap" rel="stylesheet">

    <div class="page-actions">
